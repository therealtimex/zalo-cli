name: Publish Release

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history and tags

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Check if version changed
        id: check_version
        run: |
          git fetch --tags
          VERSION=$(node -p "require('./package.json').version")
          echo "Version in package.json: v$VERSION"
          
          # Check if tag already exists in local or remote repository
          if git tag -l | grep -q "^v$VERSION$"; then
            echo "Tag v$VERSION already exists. Skipping release."
            echo "new_release=false" >> $GITHUB_OUTPUT
          else
            echo "Tag v$VERSION is new! Cutting release."
            echo "new_release=true" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.check_version.outputs.new_release == 'true'
        run: npm ci

      - name: Run lint & tests
        if: steps.check_version.outputs.new_release == 'true'
        run: |
          npm run lint
          npm run format:check
          npm test

      - name: Create and Push Git Tag
        if: steps.check_version.outputs.new_release == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.check_version.outputs.version }}"
          git push origin "v${{ steps.check_version.outputs.version }}"

      - name: Create GitHub Release
        if: steps.check_version.outputs.new_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.check_version.outputs.version }}" \
            --title "v${{ steps.check_version.outputs.version }}" \
            --generate-notes

      - name: Publish to npm
        if: steps.check_version.outputs.new_release == 'true'
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
